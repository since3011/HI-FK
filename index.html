<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HI FK</title>
    <!-- 구글 폰트: Syne (대형 글씨용 헤비 산세리프) 및 Inter (본문 및 상세 정보용) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Syne:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>

<body>

    <!-- 마우스 트레일 효과용 캔버스 -->
    <canvas id="trail-canvas"></canvas>

    <!-- 1. 배경 이미지 레이어 (텍스트 스크롤에 맞춰 각 프로젝트 이미지가 예술적인 위치에 노출됨) -->
    <div id="background-images-container" class="bg-images-container">
        <!-- JS에서 projects.js 데이터를 바탕으로 각 이미지들을 위치에 맞게 생성합니다 -->
    </div>

    <!-- 2. 고정 헤더 (사이트 로고) -->
    <header id="site-header" class="site-header">
        <!-- 중앙: 로고 -->
        <div class="logo-wrap">
            <a href="#" id="site-logo" class="site-logo">PORTFOLIO</a>
        </div>
    </header>

    <!-- 3. 메인 스크롤 콘텐츠 영역 (스크롤하면 글씨들이 올라가면서 중앙만 선명해짐) -->
    <main id="main-scroll-view" class="main-scroll-view">
        <div class="scroll-list-spacer"></div> <!-- 첫 프로젝트를 중앙에 놓기 위한 상단 여백 -->

        <nav id="scroll-titles-list" class="scroll-titles-list">
            <!-- JS에서 projects.js 데이터를 바탕으로 목록을 생성합니다 -->
        </nav>

        <div class="scroll-list-spacer"></div> <!-- 마지막 프로젝트를 중앙에 놓기 위한 하단 여백 -->
    </main>


    <!-- 자바스크립트 연결 -->
    <script src="projects.js?v=3"></script>
    <script src="main.js?v=3"></script>
</body>

</html>
